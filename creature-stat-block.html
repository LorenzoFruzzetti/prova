<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Creature Stat Block</title>
<link rel="stylesheet" href="shared.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;-webkit-tap-highlight-color:transparent}

/* ── Header toolbar ── */
.app-header{
  position:fixed;top:0;left:0;right:0;max-width:600px;margin:0 auto;
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  background:linear-gradient(180deg,var(--header-bg-1),var(--header-bg-2));
  border-bottom:1px solid var(--border);
  z-index:100;min-height:52px;
}
.header-title{flex:1;font-size:17px;font-weight:bold;color:var(--gold-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{
  background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--text-muted);font-family:sans-serif;font-size:12px;padding:5px 9px;
  cursor:pointer;white-space:nowrap;transition:color 0.15s,border-color 0.15s;
  user-select:none;-webkit-user-select:none;
}
.icon-btn:active{color:var(--gold);border-color:var(--gold)}

/* ── Page content (below fixed header) ── */
.page-content{max-width:600px;margin:0 auto;padding:64px 0 40px}

/* ── Creature grid view ── */
#gridView{max-width:600px;margin:0 auto;padding:64px 14px 40px}
.creature-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;padding-top:8px}
.creature-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;cursor:pointer;transition:border-color 0.15s,transform 0.1s;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
}
.creature-card:active{transform:scale(0.97);border-color:var(--gold)}
.creature-card.active-card{border-color:var(--gold)}
.creature-card-img{
  width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;
  font-size:40px;overflow:hidden;position:relative;
}
.creature-card-img img{width:100%;height:100%;object-fit:cover}
.creature-card-body{padding:8px 10px 10px}
.creature-card-name{font-size:13px;font-weight:bold;color:var(--text);line-height:1.2;margin-bottom:3px}
.creature-card-meta{font-size:10px;color:var(--text-muted);font-family:sans-serif}
.creature-card-cr{
  position:absolute;top:6px;right:6px;
  background:rgba(0,0,0,0.72);border:1px solid var(--gold);border-radius:4px;
  font-size:10px;font-family:sans-serif;font-weight:bold;color:var(--gold);padding:1px 5px;
}
.creature-add-card{
  background:none;border:1px dashed var(--border);border-radius:10px;
  aspect-ratio:auto;min-height:100px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  color:var(--text-muted);font-family:sans-serif;font-size:12px;
  transition:border-color 0.15s,color 0.15s;touch-action:manipulation;
}
.creature-add-card:active{border-color:var(--gold);color:var(--gold)}
.search-bar{padding:0 0 10px}
.search-bar input{
  width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:sans-serif;font-size:14px;padding:9px 12px;outline:none;
}
.search-bar input:focus{border-color:var(--gold)}

/* ── Stat block detail ── */
.stat-block{padding:14px 14px 24px}
.stat-block-name{
  font-size:24px;font-weight:bold;color:var(--gold-light);line-height:1.15;
  padding:8px 8px 8px calc(var(--roll-border) + 8px);
  box-shadow:inset var(--roll-border) 0 0 0 rgba(var(--accent-rgb),0.5);
  cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;
  border-radius:4px 0 0 4px;transition:background 0.12s;
}
.stat-block-name:active,.stat-block-name.holding{background:rgba(var(--accent-rgb),0.13)}
.stat-block-name input{
  background:none;border:none;outline:none;color:inherit;font:inherit;width:100%;
}
.stat-sub{font-size:13px;color:var(--text-muted);font-family:sans-serif;font-style:italic;padding:3px 8px 10px}
.stat-divider{border:none;border-top:1px solid var(--border);margin:10px 0}
.cr-pill{
  display:inline-block;background:rgba(var(--accent-rgb),0.15);
  border:1px solid rgba(var(--accent-rgb),0.5);border-radius:4px;
  font-size:12px;font-family:sans-serif;font-weight:bold;color:var(--gold);padding:1px 7px;
}

/* ── Defence pills ── */
.defence-pills{display:flex;flex-wrap:wrap;gap:8px;padding:6px 8px}
.defence-pill{
  flex:1;min-width:60px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:6px 10px;text-align:center;font-family:sans-serif;
}
.defence-pill-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:2px}
.defence-pill-value{font-size:16px;font-weight:bold;color:var(--text)}
.defence-pill-sub{font-size:10px;color:var(--text-muted)}

/* ── Ability grid ── */
.ability-grid{display:flex;gap:4px;padding:8px 6px;justify-content:space-between}
.ability-col{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 4px;
  min-width:0;
}
.ability-key{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:var(--gold);font-family:sans-serif;font-weight:bold}
.ability-score{font-size:18px;font-weight:bold;color:var(--text);line-height:1}
.ability-mod-badge{
  font-size:12px;font-weight:bold;font-family:sans-serif;color:var(--gold-light);
  background:rgba(var(--accent-rgb),0.12);border-radius:4px;padding:1px 5px;
}
.save-badge{font-size:9px;color:var(--text-muted);font-family:sans-serif}

/* ── Stat rows ── */
.cs-rows{padding:0 8px}
.cs-row{font-family:sans-serif;font-size:12px;padding:4px 0;color:var(--text)}
.cs-row-label{display:inline;font-weight:bold;color:var(--gold);margin-right:4px}
.cs-row-value{display:inline;color:var(--text)}

/* ── Individual sense/skill rows ── */
.detail-sub-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:3px 10px;font-family:sans-serif;font-size:12px;color:var(--text);
  border-bottom:1px solid rgba(var(--border-rgb),0.12);
}
.detail-sub-row:last-child{border-bottom:none}
.detail-sub-label{color:var(--gold);font-size:11px;font-weight:600;min-width:90px}
.detail-sub-value{color:var(--text);text-align:right;font-size:12px}
.detail-sub-section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 10px 2px;
}
.skill-expand-btn{
  font-size:9px;color:var(--gold);font-family:sans-serif;letter-spacing:1px;
  background:none;border:1px solid rgba(var(--accent-rgb),0.4);border-radius:4px;
  padding:1px 6px;cursor:pointer;user-select:none;-webkit-user-select:none;
}
.skill-expand-btn:active{border-color:var(--gold);background:rgba(var(--accent-rgb),0.12)}
/* ── Damage type pills ── */
.dmg-type-pills{display:flex;flex-wrap:wrap;gap:4px;padding:2px 0 4px}
.dmg-type-pill{
  font-size:10px;font-family:sans-serif;font-weight:600;
  border:1px solid currentColor;border-radius:4px;padding:1px 7px;
  text-transform:capitalize;
}
.dmg-interact-pill{
  cursor:pointer;user-select:none;-webkit-user-select:none;
  transition:opacity 0.12s,background 0.12s;
}
.dmg-interact-pill:active{opacity:0.6}
/* ── Section title row with info/add buttons ── */
.section-title-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 8px 6px;
}
.section-title-text{
  font-size:9px;font-family:sans-serif;font-weight:bold;letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);
}
.section-info-btn,.section-add-btn{
  font-size:10px;font-family:sans-serif;color:var(--text-muted);
  background:none;border:1px solid rgba(var(--border-rgb),0.5);border-radius:4px;
  padding:1px 6px;cursor:pointer;user-select:none;-webkit-user-select:none;
}
.section-info-btn:active,.section-add-btn:active{color:var(--gold);border-color:var(--gold)}
/* ── Edit Panel ── */
#editPanelBackdrop{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:402;opacity:0;pointer-events:none;transition:opacity 0.2s}
#editPanelBackdrop.show{opacity:1;pointer-events:auto}
#editPanel{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.88);
  background:linear-gradient(160deg,var(--panel-bg-1),var(--panel-bg-2));
  border:2px solid var(--gold);border-radius:20px;
  padding:22px 22px 18px;z-index:403;opacity:0;
  transition:opacity 0.2s,transform 0.2s;pointer-events:none;
  width:min(92vw,500px);max-height:88vh;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,0.7);
}
#editPanel.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.ep-field{margin-bottom:10px}
.ep-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:sans-serif}
.ep-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:sans-serif;font-size:13px;padding:9px 12px;outline:none;
  box-sizing:border-box;
}
.ep-input:focus{border-color:var(--gold)}
select.ep-input{cursor:pointer}
.ep-textarea{min-height:80px;resize:vertical}
.ep-row{display:flex;gap:8px}
.ep-row .ep-field{flex:1}

/* ── Legendary actions pool ── */
.legendary-pool{
  display:flex;align-items:center;gap:10px;padding:8px 8px 4px;
  font-family:sans-serif;font-size:12px;
}
.legendary-pool-label{color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:1px}
.legendary-pool-dots{display:flex;gap:4px;align-items:center;flex:1}
.legendary-restore-btn{
  background:none;border:1px solid var(--border);border-radius:4px;
  color:var(--text-muted);font-size:11px;padding:2px 7px;cursor:pointer;font-family:sans-serif;
}
.legendary-restore-btn:active{border-color:var(--gold);color:var(--gold)}

/* ── Section title ── */
.section-title{
  font-size:9px;font-family:sans-serif;font-weight:bold;letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);
  padding:12px 8px 6px;
}

/* ── Creature settings sheet ── */
#settingsBackdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;opacity:0;pointer-events:none;transition:opacity 0.2s}
#settingsBackdrop.show{opacity:1;pointer-events:auto}
#settingsSheet{
  position:fixed;bottom:0;left:0;right:0;max-width:600px;margin:0 auto;
  background:var(--surface);border:1px solid var(--border);
  border-top:2px solid var(--gold);border-radius:20px 20px 0 0;
  padding:22px 20px 40px;z-index:401;
  transform:translateY(100%);transition:transform 0.28s cubic-bezier(0.32,0.72,0,1);
}
#settingsSheet.show{transform:translateY(0)}
.hp-dlg-title{text-align:center;font-size:14px;font-family:sans-serif;font-weight:600;color:var(--gold-light);text-transform:uppercase;letter-spacing:1.5px}

/* ── Import modal ── */
#importBackdrop{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:400;opacity:0;pointer-events:none;transition:opacity 0.2s}
#importBackdrop.show{opacity:1;pointer-events:auto}
#importModal{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.88);
  background:linear-gradient(160deg,var(--panel-bg-1),var(--panel-bg-2));
  border:2px solid var(--gold);border-radius:20px;
  padding:22px 22px 18px;z-index:401;opacity:0;
  transition:opacity 0.2s,transform 0.2s;pointer-events:none;
  width:min(92vw,500px);max-height:88vh;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,0.7);
}
#importModal.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.import-tab-row{display:flex;gap:6px;margin-bottom:14px}
.import-tab-btn{
  flex:1;padding:7px 4px;font-size:11px;font-family:sans-serif;font-weight:600;
  background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--text-muted);cursor:pointer;transition:color 0.15s,border-color 0.15s,background 0.15s;
}
.import-tab-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(var(--accent-rgb),0.1)}
#importModal .panel{display:none}
#importModal .panel.active{display:block}
.ai-prompt-box{
  width:100%;min-height:72px;resize:vertical;padding:9px 12px;
  font-size:13px;font-family:sans-serif;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;
  box-sizing:border-box;margin-bottom:10px;
}
.ai-prompt-box:focus{border-color:var(--gold)}
.ai-copy-notice{font-size:11px;color:var(--spell-light);min-height:1em;margin-bottom:8px;font-family:sans-serif}
.srd-results-box{
  max-height:220px;overflow-y:auto;
  border:1px solid var(--border);border-radius:8px;background:var(--surface);margin-bottom:4px;
}
.srd-result-item{
  padding:9px 12px;border-bottom:1px solid rgba(var(--border-rgb),0.35);
  cursor:pointer;font-family:sans-serif;font-size:13px;color:var(--text);
  transition:background 0.1s;
}
.srd-result-item:last-child{border-bottom:none}
.srd-result-item:active,.srd-result-item:hover{background:rgba(var(--accent-rgb),0.1);color:var(--gold)}
.srd-hint{padding:14px 12px;color:var(--text-muted);font-family:sans-serif;font-size:12px;text-align:center}

/* ── Inline editable field ── */
.cs-inline-input{
  background:none;border:none;border-bottom:1px solid rgba(var(--border-rgb),0.5);
  color:var(--text);font-family:sans-serif;font-size:12px;outline:none;
  padding:1px 4px;flex:1;min-width:60px;
}
.cs-inline-input:focus{border-bottom-color:var(--gold)}
.cs-inline-input::placeholder{color:var(--text-muted);opacity:0.7}

/* ── Detail tab bar ── */
.detail-tab-bar{
  position:fixed;top:52px;left:0;right:0;max-width:600px;margin:0 auto;
  display:flex;background:var(--surface);border-bottom:2px solid var(--border);z-index:98;
}
.detail-tab-btn{
  flex:1;padding:9px 4px;text-align:center;
  font-size:11px;font-family:sans-serif;font-weight:600;letter-spacing:0.5px;
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--text-muted);cursor:pointer;
  transition:color 0.15s,border-color 0.15s;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
  margin-bottom:-2px;
}
.detail-tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.detail-tab-btn:active{color:var(--gold-light)}
#detailView .page-content{padding-top:100px}
</style>
</head>
<body data-theme="dark">

<!-- ── GRID VIEW ── -->
<div id="gridView">
  <div class="app-header">
    <button class="icon-btn" id="backBtn" style="display:none" onclick="goBackToCharacter()">← Back</button>
    <div class="header-title">🐉 Creatures</div>
    <div style="display:flex;gap:6px">
      <button class="icon-btn" onclick="openImportModal()">Import ▾</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="search" id="creatureSearch" placeholder="Search by name, type, CR…" oninput="filterCreatures()">
  </div>
  <div id="creatureGrid" class="creature-grid"></div>
</div>

<!-- ── DETAIL VIEW ── -->
<div id="detailView" style="display:none">
  <div class="app-header">
    <button class="icon-btn" onclick="showGrid()">← All</button>
    <div class="header-title" id="detailHeaderTitle" style="flex:1"></div>
    <div style="display:flex;gap:6px">
      <button class="icon-btn" id="detailBackBtn" style="display:none" onclick="goBackToCharacter()">← Char</button>
      <button class="icon-btn" onclick="openImportModal()">Import ▾</button>
      <button class="icon-btn" onclick="openCreatureSettings()">⚙</button>
    </div>
  </div>
  <div id="detailTabBar" class="detail-tab-bar">
    <button class="detail-tab-btn" data-tab="info" onclick="switchDetailTab('info')">📋 Info</button>
    <button class="detail-tab-btn" data-tab="combat" onclick="switchDetailTab('combat')">⚔️ Combat</button>
    <button class="detail-tab-btn" data-tab="lair" onclick="switchDetailTab('lair')">🏰 Lair</button>
  </div>
  <div class="page-content">
    <div id="statBlock" class="stat-block"></div>
  </div>
</div>

<!-- ── ROLL OVERLAY ── -->
<div id="rollBackdrop" onclick="dismissRollResult()"></div>
<div id="rollResult" onclick="dismissRollResult()">
  <div class="rr-label" id="rrLabel">—</div>
  <div class="rr-total" id="rrTotal">—</div>
  <div class="rr-breakdown" id="rrBreak"></div>
  <div class="rr-secondary" id="rrSecondary"></div>
  <div class="rr-nat" id="rrNat"></div>
  <span class="rr-dismiss">tap to dismiss</span>
</div>

<!-- ── INFO PANEL ── -->
<div id="infoPanelBackdrop" onclick="dismissInfoPanel()"></div>
<div id="infoPanel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <div class="sp-mode-badge" id="ipBadge">Info</div>
    <button class="attack-edit-btn" id="ipEditBtn" style="display:none" onclick="event.stopPropagation();infoPanelEdit()">Edit</button>
  </div>
  <div class="sp-name" id="ipTitle"></div>
  <div class="sp-meta" id="ipMeta" style="display:none"></div>
  <div class="roll-tri" id="ipRollBox" style="display:none">
    <div class="rtz-top" onclick="event.stopPropagation();infoPanelRoll('normal')">
      <div class="rtz-label" id="ipRollLabel">Attack Roll</div>
      <div class="rtz-bonus" id="ipRollBonus">+0</div>
      <div class="rtz-damage" id="ipRollDamage" style="display:none"></div>
    </div>
    <div class="rtz-bottom">
      <div class="rtz-dis" onclick="event.stopPropagation();infoPanelRoll('dis')">Disadv</div>
      <div class="rtz-adv" onclick="event.stopPropagation();infoPanelRoll('adv')">Adv</div>
    </div>
  </div>
  <div class="sp-save-dc-box" id="ipSaveDcBox" style="display:none">
    <div class="sp-save-dc-label">Save DC</div>
    <div class="sp-save-dc-value" id="ipSaveDcValue">—</div>
    <div class="sp-save-dc-ability" id="ipSaveDcAbility"></div>
  </div>
  <div class="sp-atk-box" id="ipSimpleRollBox" style="display:none" onclick="event.stopPropagation();infoPanelSimpleRoll()">
    <div class="sp-atk-label" id="ipSimpleRollLabel">Damage — tap to roll</div>
    <div class="sp-atk-bonus" id="ipSimpleRollBonus"></div>
  </div>
  <div class="sp-description" id="ipDesc"></div>
  <div id="ipEditSection" style="display:none"></div>
  <button class="cond-toggle-btn" id="ipActionBtn" style="display:none" onclick="event.stopPropagation();infoPanelAction()"></button>
  <span class="sp-dismiss-hint" id="ipDismissHint">tap to dismiss</span>
</div>

<!-- ── CREATURE SETTINGS SHEET ── -->
<div id="settingsBackdrop" onclick="dismissCreatureSettings()"></div>
<div id="settingsSheet">
  <div class="hp-dlg-title">Creature Options</div>
  <div style="height:10px"></div>
  <button class="settings-full-btn" onclick="exportCreatureJSON();dismissCreatureSettings()">💾 Export JSON</button>
  <label class="settings-full-btn">📂 Import from JSON
    <input type="file" accept=".json" style="display:none" onchange="importCreatureFromJSON(this)">
  </label>
  <button class="settings-full-btn" onclick="openPortraitPicker()">🖼 Set Portrait</button>
  <input type="file" id="portraitInput" accept="image/*" style="display:none" onchange="handlePortraitFile(this)">
  <hr style="border-color:var(--border);margin:10px 0">
  <button class="settings-full-btn" style="color:var(--red-light)" onclick="deleteCurrentCreature()">🗑 Delete Creature</button>
  <button class="hp-dlg-btn" onclick="dismissCreatureSettings()" style="width:100%;margin-top:6px">Close</button>
</div>

<!-- ── IMPORT MODAL ── -->
<div id="importBackdrop" onclick="dismissImportModal()"></div>
<div id="importModal">
  <div class="sp-mode-badge" style="color:var(--spell-light);margin-bottom:12px">Import Creature</div>
  <div class="import-tab-row">
    <button class="import-tab-btn tab-btn active" data-tab="ai"    onclick="switchTab('ai')">✨ AI</button>
    <button class="import-tab-btn tab-btn"        data-tab="srd14" onclick="switchTab('srd14')">📖 2014</button>
    <button class="import-tab-btn tab-btn"        data-tab="srd24" onclick="switchTab('srd24')">📗 2024</button>
  </div>

  <!-- AI tab -->
  <div id="panel-ai" class="panel active">
    <div style="font-size:10px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Creature name or description</div>
    <textarea class="ai-prompt-box" id="aiWhatInput" placeholder="e.g. Ancient Red Dragon, Goblin Boss, Aboleth…"></textarea>
    <button class="settings-full-btn" style="margin-bottom:10px" onclick="generateAndCopyCreaturePrompt()">Copy prompt to clipboard</button>
    <div class="ai-copy-notice" id="aiCopyNotice"></div>
    <div style="font-size:10px;color:var(--text-muted);margin:6px 0;text-transform:uppercase;letter-spacing:1px">Paste AI JSON response</div>

  <!-- SRD 2014 tab -->
  <div id="panel-srd14" class="panel">
    <input type="search" id="srd14SearchInput" class="ai-prompt-box" style="min-height:unset;padding:9px 12px;resize:none" placeholder="Search monsters (2014 SRD)…" oninput="onSrd14Search()">
    <div id="srd14Status" style="font-size:11px;color:var(--text-muted);min-height:16px;margin-bottom:6px;font-family:sans-serif"></div>
    <div id="srd14Results" class="srd-results-box"><div class="srd-hint">Type to search monsters.</div></div>
  </div>

  <!-- SRD 2024 tab -->
  <div id="panel-srd24" class="panel">
    <input type="search" id="srd24SearchInput" class="ai-prompt-box" style="min-height:unset;padding:9px 12px;resize:none" placeholder="Search monsters (2024 SRD)…" oninput="onSrd24Search()">
    <div id="srd24Status" style="font-size:11px;color:var(--text-muted);min-height:16px;margin-bottom:6px;font-family:sans-serif"></div>
    <div id="srd24Results" class="srd-results-box"><div class="srd-hint">Type to search monsters.</div></div>
  </div>

  <button class="hp-dlg-btn" onclick="dismissImportModal()" style="width:100%;margin-top:10px">Cancel</button>
</div>

<div id="toast"></div>

<div id="editPanelBackdrop" onclick="dismissEditPanel()"></div>
<div id="editPanel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="sp-mode-badge" id="epBadge" style="color:var(--spell-light)">Edit</div>
    <button class="attack-edit-btn" id="epDeleteBtn" onclick="deleteFromEditPanel()" style="color:var(--red-light);border-color:var(--red-light)">Delete</button>
  </div>
  <div id="epForm"></div>
  <div style="display:flex;gap:8px;margin-top:14px">
    <button class="hp-dlg-btn" onclick="dismissEditPanel()" style="flex:1">Cancel</button>
    <button class="hp-dlg-btn" onclick="saveEditPanel()" style="flex:1;border-color:var(--gold);color:var(--gold)">Save</button>
  </div>
</div>

<script src="shared.js"></script>
<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────────
const CREATURE_KEY  = 'dnd5e_creatures';
const CONTEXT_KEY   = 'dnd5e_creature_context';
const OPEN_KEY      = 'dnd5e_creature_open';
const SRD_API       = 'https://www.dnd5eapi.co/api';
const ABILITIES     = ['STR','DEX','CON','INT','WIS','CHA'];
const STANDARD_DMG_TYPES = ['acid','bludgeoning','cold','fire','force','lightning','necrotic','piercing','poison','psychic','radiant','slashing','thunder'];

const CR_XP = {
  0:10, 0.125:25, 0.25:50, 0.5:100,
  1:200,2:450,3:700,4:1100,5:1800,6:2300,7:2900,8:3900,9:5000,10:5900,
  11:7200,12:8400,13:10000,14:11500,15:13000,16:15000,17:18000,18:20000,
  19:22000,20:25000,21:33000,22:41000,23:50000,24:62000,25:75000,
  26:90000,27:105000,28:120000,29:135000,30:155000
};

const ALL_CREATURE_SKILLS = [
  {name:'Athletics',        ability:'STR', key:'athletics'},
  {name:'Acrobatics',       ability:'DEX', key:'acrobatics'},
  {name:'Sleight of Hand',  ability:'DEX', key:'sleight of hand'},
  {name:'Stealth',          ability:'DEX', key:'stealth'},
  {name:'Arcana',           ability:'INT', key:'arcana'},
  {name:'History',          ability:'INT', key:'history'},
  {name:'Investigation',    ability:'INT', key:'investigation'},
  {name:'Nature',           ability:'INT', key:'nature'},
  {name:'Religion',         ability:'INT', key:'religion'},
  {name:'Animal Handling',  ability:'WIS', key:'animal handling'},
  {name:'Insight',          ability:'WIS', key:'insight'},
  {name:'Medicine',         ability:'WIS', key:'medicine'},
  {name:'Perception',       ability:'WIS', key:'perception'},
  {name:'Survival',         ability:'WIS', key:'survival'},
  {name:'Deception',        ability:'CHA', key:'deception'},
  {name:'Intimidation',     ability:'CHA', key:'intimidation'},
  {name:'Performance',      ability:'CHA', key:'performance'},
  {name:'Persuasion',       ability:'CHA', key:'persuasion'},
];

const SECTION_DESCRIPTIONS = {
  specialAbilities: 'Traits are persistent abilities or limited-use powers. Some have charges (e.g. Legendary Resistance 3/Day) that reset after a rest. Hold an item to view its details, or tap ⊕ to add a new trait.',
  actions: 'Actions are used on the creature\'s turn. Some have limited uses or require a recharge roll (e.g. "Recharge 5-6": at the start of the creature\'s turn it rolls a d6; on 5–6 the action recharges).',
  bonusActions: 'Bonus actions are extra actions taken on the creature\'s turn in addition to its main action. A creature can normally use only one bonus action per turn.',
  reactions: 'Reactions occur instantly in response to a trigger, even outside the creature\'s own turn. A creature can use only one reaction per round, regaining it at the start of its next turn.',
  legendaryActions: 'Legendary actions can be taken at the end of another creature\'s turn by spending points from the legendary action pool. The pool resets at the start of the creature\'s turn. Each action costs 1 or more points.',
  lairActions: 'Lair actions occur on initiative count 20 (losing all ties) while the creature is in its lair. The environment itself acts, imposing hazards or granting advantages.',
};

// ── Local SRD helpers (same pattern as character sheet) ────────────────
async function _srdGet(path) {
  const key = 'srd_v1_' + path;
  const hit = localStorage.getItem(key);
  if (hit) return JSON.parse(hit);
  const res = await fetch(SRD_API + path);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
  return data;
}

let _srd24Available = null;
let _srd24Translation = null;
const _srd24Files = {};

async function _srd24Detect() {
  if (_srd24Available !== null) return _srd24Available;
  try {
    const r = await fetch('srd2024/translation.json');
    if (!r.ok) { _srd24Available = false; return false; }
    _srd24Translation = await r.json();
    _srd24Available = true;
  } catch { _srd24Available = false; }
  return _srd24Available;
}

async function _srd24Load(category) {
  if (_srd24Files[category]) return _srd24Files[category];
  const r = await fetch(`srd2024/${category}.json`);
  if (!r.ok) throw new Error(`2024 SRD ${category}.json unavailable`);
  _srd24Files[category] = await r.json();
  return _srd24Files[category];
}

// ── Creature state ─────────────────────────────────────────────────────
function defaultCreature() {
  return {
    name: 'New Creature',
    source: 'manual',
    portrait: null,
    notes: '',
    size: 'Medium',
    type: '',
    subtype: '',
    alignment: '',
    cr: 1,
    xp: 200,
    ac: 10, acDetail: '',
    hp: 10, hitDice: '',
    speed: { walk:30, fly:0, swim:0, climb:0, burrow:0, hover:false },
    abilities: { STR:10, DEX:10, CON:10, INT:10, WIS:10, CHA:10 },
    savingThrows: {},
    skills: {},
    damageImmunities: [],
    damageResistances: [],
    damageVulnerabilities: [],
    conditionImmunities: [],
    senses: { darkvision:0, blindsight:0, truesight:0, tremorsense:0, passivePerception:10 },
    telepathy: 0,
    languages: '',
    legendaryActionsMax: 0,
    legendaryActionsUsed: 0,
    specialAbilities: [],
    actions: [],
    reactions: [],
    bonusActions: [],
    legendaryActions: [],
    lairActions: [],
    initiative: '',
    habitat: '',
    treasure: '',
    lairDescription: '',
  };
}

// ── Roster management ──────────────────────────────────────────────────
let rosterData = { creatures: {}, activeId: null };
let activeId   = null;
let creature   = defaultCreature();

function loadRoster() {
  try {
    const raw = localStorage.getItem(CREATURE_KEY);
    rosterData = raw ? JSON.parse(raw) : { creatures: {}, activeId: null };
    if (!rosterData.creatures) rosterData.creatures = {};
  } catch(e) { rosterData = { creatures: {}, activeId: null }; }
}

function saveRoster() {
  if (activeId) {
    rosterData.creatures[activeId] = { name: creature.name, portrait: creature.portrait, payload: creature };
    rosterData.activeId = activeId;
  }
  try { localStorage.setItem(CREATURE_KEY, JSON.stringify(rosterData)); } catch(e) {}
}

function newCreature() {
  saveRoster();
  const id = genId();
  activeId = id;
  creature = defaultCreature();
  rosterData.creatures[id] = { name: creature.name, portrait: null, payload: creature };
  rosterData.activeId = id;
  saveRoster();
  renderCreatureDetail();
  showDetail();
  toast('New creature created');
}

function switchCreature(id) {
  saveRoster();
  activeId = id;
  const entry = rosterData.creatures[id];
  creature = entry?.payload ? JSON.parse(JSON.stringify(entry.payload)) : defaultCreature();
  rosterData.activeId = id;
  saveRoster();
  renderCreatureDetail();
  showDetail();
}

function deleteCurrentCreature() {
  dismissCreatureSettings();
  const ids = Object.keys(rosterData.creatures);
  if (ids.length <= 1) {
    toast('Cannot delete the only creature');
    return;
  }
  const name = creature.name;
  delete rosterData.creatures[activeId];
  const newId = Object.keys(rosterData.creatures)[0];
  activeId = newId;
  rosterData.activeId = newId;
  creature = rosterData.creatures[newId]?.payload ? JSON.parse(JSON.stringify(rosterData.creatures[newId].payload)) : defaultCreature();
  saveRoster();
  renderGrid();
  showGrid();
  toast(`${name} deleted`);
}

// ── CR helpers ─────────────────────────────────────────────────────────
function crDisplay(cr) {
  if (cr === 0.125) return '1/8';
  if (cr === 0.25)  return '1/4';
  if (cr === 0.5)   return '1/2';
  return String(cr);
}

function crProfBonus(cr) {
  if (cr <= 4)  return 2;
  if (cr <= 8)  return 3;
  if (cr <= 12) return 4;
  if (cr <= 16) return 5;
  if (cr <= 20) return 6;
  if (cr <= 24) return 7;
  if (cr <= 28) return 8;
  return 9;
}

function crXP(cr) {
  return CR_XP[cr] ?? CR_XP[Math.round(cr)] ?? 0;
}

// ── View management ────────────────────────────────────────────────────
function showGrid() {
  document.getElementById('gridView').style.display = '';
  document.getElementById('detailView').style.display = 'none';
  renderGrid();
}

function showDetail() {
  document.getElementById('gridView').style.display = 'none';
  document.getElementById('detailView').style.display = '';
  document.getElementById('detailHeaderTitle').textContent = creature.name || 'Creature';
  // Show "← Char" button if navigated from character sheet
  const ctx = _getContext();
  document.getElementById('detailBackBtn').style.display = ctx ? '' : 'none';
  if (ctx) document.getElementById('detailBackBtn').textContent = `← ${ctx.charName || 'Char'}`;
}

function _getContext() {
  try { return JSON.parse(localStorage.getItem(CONTEXT_KEY)); } catch { return null; }
}

function goBackToCharacter() {
  const ctx = _getContext();
  localStorage.removeItem(CONTEXT_KEY);
  localStorage.removeItem(OPEN_KEY);
  if (ctx?.url) { window.location.href = ctx.url; }
  else { window.location.href = 'dnd-character-sheet.html'; }
}

// ── Detail tab management ──────────────────────────────────────────────
let _activeDetailTab = 'combat'; // Combat is the default — most useful during encounters

function switchDetailTab(tab) {
  _activeDetailTab = tab;
  document.querySelectorAll('#detailTabBar .detail-tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  ['info','combat','lair'].forEach(t => {
    const el = document.getElementById('sbPanel-' + t);
    if (el) el.style.display = t === tab ? '' : 'none';
  });
  window.scrollTo(0, 0);
}

// ── Grid rendering ─────────────────────────────────────────────────────
function renderGrid() {
  const grid   = document.getElementById('creatureGrid');
  const search = (document.getElementById('creatureSearch')?.value || '').toLowerCase();
  grid.innerHTML = '';

  // "Back to character" header if context set
  const ctx = _getContext();
  const backBtn = document.getElementById('backBtn');
  if (ctx) {
    backBtn.style.display = '';
    backBtn.textContent = `← ${ctx.charName || 'Character'}`;
  } else {
    backBtn.style.display = 'none';
  }

  Object.entries(rosterData.creatures).forEach(([id, entry]) => {
    const p = entry.payload || {};
    const name = p.name || entry.name || 'Unnamed';
    const type = p.type || '';
    const cr   = p.cr !== undefined ? crDisplay(p.cr) : '?';
    const searchStr = (name + ' ' + type + ' cr' + cr).toLowerCase();
    if (search && !searchStr.includes(search)) return;

    const card = document.createElement('div');
    card.className = 'creature-card' + (id === activeId ? ' active-card' : '');

    const imgEl = document.createElement('div');
    imgEl.className = 'creature-card-img';
    if (entry.portrait || p.portrait) {
      const img = document.createElement('img');
      img.src = entry.portrait || p.portrait;
      img.alt = name;
      imgEl.appendChild(img);
    } else {
      imgEl.textContent = '🐉';
    }
    const crDiv = document.createElement('div');
    crDiv.className = 'creature-card-cr';
    crDiv.textContent = 'CR ' + cr;
    imgEl.appendChild(crDiv);

    const body = document.createElement('div');
    body.className = 'creature-card-body';
    body.innerHTML = `<div class="creature-card-name">${escHtml(name)}</div>
      <div class="creature-card-meta">${escHtml([p.size, p.type].filter(Boolean).join(' ') || '—')}</div>`;

    card.appendChild(imgEl);
    card.appendChild(body);

    let holdTimer = null;
    card.addEventListener('pointerdown', () => {
      holdTimer = setTimeout(() => {
        holdTimer = null;
        showCardOptions(id, entry, p);
      }, 600);
    });
    card.addEventListener('pointerup', () => {
      if (holdTimer !== null) {
        clearTimeout(holdTimer);
        holdTimer = null;
        switchCreature(id);
      }
    });
    card.addEventListener('pointercancel', () => { clearTimeout(holdTimer); holdTimer = null; });
    card.addEventListener('contextmenu', e => e.preventDefault());

    grid.appendChild(card);
  });

  // "Add new" card
  const addCard = document.createElement('div');
  addCard.className = 'creature-add-card';
  addCard.innerHTML = '<div style="font-size:28px">➕</div><div>New Creature</div>';
  addCard.onclick = newCreature;
  grid.appendChild(addCard);
}

function filterCreatures() { renderGrid(); }

function showCardOptions(id, entry, p) {
  if (confirm(`Delete "${p.name || entry.name}"? This cannot be undone.`)) {
    delete rosterData.creatures[id];
    if (activeId === id) {
      const remaining = Object.keys(rosterData.creatures);
      activeId = remaining[0] || null;
      rosterData.activeId = activeId;
      creature = activeId ? (rosterData.creatures[activeId]?.payload ? JSON.parse(JSON.stringify(rosterData.creatures[activeId].payload)) : defaultCreature()) : defaultCreature();
    }
    saveRoster();
    renderGrid();
    toast('Deleted');
  }
}

// ── Detail rendering ───────────────────────────────────────────────────
function renderCreatureDetail() {
  const sb = document.getElementById('statBlock');
  if (!sb) return;

  const c = creature;
  const pb = crProfBonus(c.cr);
  const xp = crXP(c.cr);

  sb.innerHTML = '';

  // Creature name — always visible above the tab panels
  const nameDiv = document.createElement('div');
  nameDiv.className = 'stat-block-name';
  nameDiv.id = 'creatureNameEl';
  nameDiv.innerHTML = `<input id="creatureNameInput" value="${escHtml(c.name)}" placeholder="Creature Name"
    oninput="creature.name=this.value;document.getElementById('detailHeaderTitle').textContent=this.value;saveRoster()"
    onclick="event.stopPropagation()" style="background:none;border:none;outline:none;color:inherit;font:inherit;width:100%;font-size:24px">`;
  let nameHoldTimer = null;
  nameDiv.addEventListener('pointerdown', e => {
    if (e.target.tagName === 'INPUT') return;
    nameHoldTimer = setTimeout(() => { nameHoldTimer = null; openCreatureInfoPanel(); }, 500);
  });
  nameDiv.addEventListener('pointerup', () => { clearTimeout(nameHoldTimer); nameHoldTimer = null; });
  nameDiv.addEventListener('pointercancel', () => { clearTimeout(nameHoldTimer); nameHoldTimer = null; });
  nameDiv.addEventListener('contextmenu', e => e.preventDefault());
  sb.appendChild(nameDiv);

  const subDiv = document.createElement('div');
  subDiv.className = 'stat-sub';
  const sub = [c.size, c.type + (c.subtype ? ` (${c.subtype})` : '')].filter(Boolean).join(' ');
  subDiv.textContent = (sub ? sub.charAt(0).toUpperCase() + sub.slice(1) : 'Unknown') + (c.alignment ? ' · ' + c.alignment : '');
  sb.appendChild(subDiv);

  // Three tab panels
  const infoPanel   = document.createElement('div'); infoPanel.id   = 'sbPanel-info';
  const combatPanel = document.createElement('div'); combatPanel.id = 'sbPanel-combat';
  const lairPanel   = document.createElement('div'); lairPanel.id   = 'sbPanel-lair';

  _buildInfoPanel(infoPanel, c, pb, xp);
  _buildCombatPanel(combatPanel, c, pb, xp);
  _buildLairPanel(lairPanel, c);

  sb.appendChild(infoPanel);
  sb.appendChild(combatPanel);
  sb.appendChild(lairPanel);

  // Show the active tab (also sets button active classes)
  switchDetailTab(_activeDetailTab);

  // Render dots — panels are in the DOM even when hidden, so IDs are reachable
  const _dotSections = ['specialAbilities','actions','bonusActions','reactions','legendaryActions','lairActions'];
  _dotSections.forEach(sec => (c[sec] || []).forEach((_, i) => renderDots(sec, i)));
}

// ── Panel builders ─────────────────────────────────────────────────────
function _buildInfoPanel(panel, c, pb, xp) {
  // Description / notes textarea
  panel.appendChild(_divider());
  panel.appendChild(_sectionTitle('Description', 'notes'));
  const notesArea = document.createElement('textarea');
  notesArea.style.cssText = 'width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:sans-serif;font-size:13px;padding:10px;resize:vertical;min-height:100px;outline:none;box-sizing:border-box;margin:0 0 4px';
  notesArea.value = c.notes || '';
  notesArea.placeholder = 'Description, lore, encounter tips…';
  notesArea.addEventListener('input', () => { creature.notes = notesArea.value; saveRoster(); });
  panel.appendChild(notesArea);

  // Stat details
  panel.appendChild(_divider());
  const rowsDiv = document.createElement('div');
  rowsDiv.className = 'cs-rows';
  panel.appendChild(rowsDiv);

  _addRow(rowsDiv, 'Challenge', `${crDisplay(c.cr)} (${(xp||0).toLocaleString()} XP)`);
  _addEditableRow(rowsDiv, 'Habitat',  c.habitat || '', v => { creature.habitat  = v; saveRoster(); }, 'e.g. Swamp, Forest, Desert');
  _addEditableRow(rowsDiv, 'Treasure', c.treasure || '', v => { creature.treasure = v; saveRoster(); }, 'e.g. Relics, Coins, Art Objects');
  _addEditableRow(rowsDiv, 'Languages', c.languages || '', v => { creature.languages = v; saveRoster(); }, 'Languages spoken');

  // Senses
  _buildSensesRows(rowsDiv, c);
}

function _buildCombatPanel(panel, c, pb, xp) {
  const speedStr = _speedStr(c.speed);

  // Defence pills
  panel.appendChild(_divider());
  const pillsDiv = document.createElement('div');
  pillsDiv.className = 'defence-pills';
  pillsDiv.innerHTML = `
    ${_pill('AC', c.ac, c.acDetail || '')}
    ${_pill('HP', c.hp, c.hitDice || '')}
    ${_pill('Speed', speedStr, '')}
    ${_pill('CR', crDisplay(c.cr), `XP ${(xp||0).toLocaleString()}`)}
  `;
  panel.appendChild(pillsDiv);

  // Initiative (editable row)
  const initDiv = document.createElement('div');
  initDiv.className = 'cs-rows';
  _addEditableRow(initDiv, 'Initiative', c.initiative || '', v => { creature.initiative = v; saveRoster(); }, '+0');
  panel.appendChild(initDiv);

  // Ability grid
  const abDiv = document.createElement('div');
  abDiv.className = 'ability-grid';
  ABILITIES.forEach(ab => {
    const score = c.abilities[ab] || 10;
    const m     = mod(score);
    const sv    = c.savingThrows[ab];
    const svTxt = (sv !== undefined) ? `Save ${fmtMod(sv)}` : '';
    abDiv.innerHTML += `
      <div class="ability-col">
        <div class="ability-key">${ab}</div>
        <div class="ability-score">${score}</div>
        <div class="ability-mod-badge">${fmtMod(m)}</div>
        ${svTxt ? `<div class="save-badge">${escHtml(svTxt)}</div>` : ''}
      </div>`;
  });
  panel.appendChild(abDiv);

  // Stat rows (saves, skills, damage types, condition immunities, proficiency bonus)
  const rowsDiv = document.createElement('div');
  rowsDiv.className = 'cs-rows';
  panel.appendChild(rowsDiv);

  const savesArr = Object.entries(c.savingThrows).map(([ab, val]) => `${ab} ${fmtMod(val)}`);
  if (savesArr.length) _addRow(rowsDiv, 'Saving Throws', savesArr.join(', '));

  _buildSkillsRows(rowsDiv, c);

  // Damage interactions — interactive cycling grid
  _buildDamageInteractionsGrid(rowsDiv, c);
  if (c.conditionImmunities?.length) _addRow(rowsDiv, 'Condition Immunities', c.conditionImmunities.join(', '));
  _addRow(rowsDiv, 'Proficiency Bonus', fmtMod(pb));

  // Traits (special abilities)
  panel.appendChild(_divider());
  panel.appendChild(_sectionTitle('Traits', 'specialAbilities'));
  if (c.specialAbilities?.length) {
    c.specialAbilities.forEach((sa, i) => panel.appendChild(_actionRow('specialAbilities', i, sa)));
  } else {
    panel.appendChild(_emptyHint('No traits. Tap ＋ to add.'));
  }

  // Actions
  panel.appendChild(_divider());
  panel.appendChild(_sectionTitle('Actions', 'actions'));
  if (c.actions?.length) {
    c.actions.forEach((a, i) => panel.appendChild(_actionRow('actions', i, a)));
  } else {
    panel.appendChild(_emptyHint('No actions. Tap ＋ to add.'));
  }

  // Bonus Actions
  panel.appendChild(_divider());
  panel.appendChild(_sectionTitle('Bonus Actions', 'bonusActions'));
  if (c.bonusActions?.length) {
    c.bonusActions.forEach((ba, i) => panel.appendChild(_actionRow('bonusActions', i, ba)));
  } else {
    panel.appendChild(_emptyHint('No bonus actions.'));
  }

  // Reactions
  panel.appendChild(_divider());
  panel.appendChild(_sectionTitle('Reactions', 'reactions'));
  if (c.reactions?.length) {
    c.reactions.forEach((r, i) => panel.appendChild(_actionRow('reactions', i, r)));
  } else {
    panel.appendChild(_emptyHint('No reactions.'));
  }

  // Legendary Actions
  if (c.legendaryActions?.length || c.legendaryActionsMax > 0) {
    panel.appendChild(_divider());
    panel.appendChild(_sectionTitle('Legendary Actions', 'legendaryActions'));
    if (c.legendaryActionsMax > 0) {
      const poolDiv = document.createElement('div');
      poolDiv.className = 'legendary-pool';
      poolDiv.innerHTML = `<span class="legendary-pool-label">Pool</span>
        <div class="legendary-pool-dots" id="legendaryPoolDots"></div>
        <button class="legendary-restore-btn" onclick="restoreLegendaryPool()">⏻</button>`;
      panel.appendChild(poolDiv);
      renderLegendaryPool();
    }
    c.legendaryActions.forEach((la, i) => panel.appendChild(_actionRow('legendaryActions', i, la)));
  }
}

function _buildLairPanel(panel, c) {
  // Lair description textarea
  panel.appendChild(_divider());
  panel.appendChild(_sectionTitle('Lair Description', 'notes'));
  const lairDescArea = document.createElement('textarea');

// ── Damage type pills ──────────────────────────────────────────────────
function _dmgTypeColor(type) {
  const map = {
    fire:'#e87070', cold:'#70a8e8', lightning:'#d4d470', acid:'#80c880',
    poison:'#b070c8', necrotic:'#909090', radiant:'#e8d070', psychic:'#c070e8',
    force:'#70c8e8', thunder:'#8090c0', bludgeoning:'#b0a090',
    piercing:'#90a090', slashing:'#a09070',
  };
  return map[(type||'').toLowerCase()] || 'var(--text-muted)';
}

function _getDmgState(c, type) {
  const t = type.toLowerCase();
  if ((c.damageImmunities      || []).some(x => x.toLowerCase() === t)) return 'immune';
  if ((c.damageResistances     || []).some(x => x.toLowerCase() === t)) return 'resistant';
  if ((c.damageVulnerabilities || []).some(x => x.toLowerCase() === t)) return 'vulnerable';
  return 'normal';
}

function _cycleDmgState(type) {
  const t = type.toLowerCase();
  const cur = _getDmgState(creature, t);
  creature.damageResistances     = (creature.damageResistances     || []).filter(x => x.toLowerCase() !== t);
  creature.damageImmunities      = (creature.damageImmunities      || []).filter(x => x.toLowerCase() !== t);
  creature.damageVulnerabilities = (creature.damageVulnerabilities || []).filter(x => x.toLowerCase() !== t);
  const next = cur === 'normal' ? 'resistant' : cur === 'resistant' ? 'immune' : cur === 'immune' ? 'vulnerable' : 'normal';
  if (next === 'resistant')  creature.damageResistances.push(t);
  else if (next === 'immune')     creature.damageImmunities.push(t);
  else if (next === 'vulnerable') creature.damageVulnerabilities.push(t);
  saveRoster();
  const old = document.getElementById('dmgInteractionsWrapper');
  if (old) old.replaceWith(_buildDmgInteractionsWrapper(creature));
}

function _buildDmgInteractionsWrapper(c) {
  const wrapper = document.createElement('div');
  wrapper.id = 'dmgInteractionsWrapper';
  wrapper.style.cssText = 'padding:3px 10px 6px';
  const labelEl = document.createElement('div');
  labelEl.className = 'cs-row-label';
  labelEl.style.cssText = 'font-family:sans-serif;font-size:11px;display:block;padding:2px 0';
  labelEl.textContent = 'Damage:';
  wrapper.appendChild(labelEl);
  const pillsDiv = document.createElement('div');
  pillsDiv.className = 'dmg-type-pills';
  // Standard types + any non-standard already in the arrays
  const extraTypes = [
    ...(c.damageImmunities || []),
    ...(c.damageResistances || []),
    ...(c.damageVulnerabilities || []),
  ].map(x => x.toLowerCase()).filter(x => !STANDARD_DMG_TYPES.includes(x));
  const allTypes = [...STANDARD_DMG_TYPES, ...new Set(extraTypes)];
  allTypes.forEach(t => {
    const state = _getDmgState(c, t);
    const pill = document.createElement('span');
    pill.className = 'dmg-type-pill dmg-interact-pill';
    const baseColor = _dmgTypeColor(t);
    if (state === 'normal') {
      pill.style.color = 'var(--text-muted)';
      pill.style.borderColor = 'var(--border)';
      pill.style.opacity = '0.4';
    } else if (state === 'resistant') {
      pill.style.color = baseColor;
      pill.style.borderColor = baseColor;
    } else if (state === 'immune') {
      pill.style.color = '#fff';
      pill.style.borderColor = '#111';
      pill.style.background = '#111';
    } else { // vulnerable
      pill.style.color = '#e8705a';
      pill.style.borderColor = '#e8705a';
    }
    const label = t.charAt(0).toUpperCase() + t.slice(1);
    const suffix = state === 'resistant' ? ' ½' : state === 'immune' ? ' ✕' : state === 'vulnerable' ? ' ×2' : '';
    pill.textContent = label + suffix;
    pill.title = state === 'normal' ? 'Normal — tap to make resistant' : `${state} — tap to cycle`;
    pill.addEventListener('click', () => _cycleDmgState(t));
    pillsDiv.appendChild(pill);
  });
  wrapper.appendChild(pillsDiv);
  const hint = document.createElement('div');
  hint.style.cssText = 'font-size:9px;color:var(--text-muted);font-family:sans-serif;padding-top:2px;letter-spacing:0.3px';
  hint.textContent = 'tap: resistant → immune → vulnerable → normal';
  wrapper.appendChild(hint);
  return wrapper;
}

function _buildDamageInteractionsGrid(container, c) {
  container.appendChild(_buildDmgInteractionsWrapper(c));
}

function _speedStr(speed) {
  if (!speed) return '—';
  const parts = [];
  if (speed.walk)  parts.push(`${speed.walk} ft.`);
  if (speed.fly)   parts.push(`fly ${speed.fly} ft.${speed.hover ? ' (hover)' : ''}`);
  if (speed.swim)  parts.push(`swim ${speed.swim} ft.`);
  if (speed.climb) parts.push(`climb ${speed.climb} ft.`);
  if (speed.burrow)parts.push(`burrow ${speed.burrow} ft.`);
  return parts.join(', ') || '—';
}

function _actionRow(section, index, item) {
  const hasAttack = item.attackBonus && item.attackBonus !== '—';
  const hasDmg    = item.rolls && item.rolls.length > 0;
  const hasSave   = item.saveAbility && item.saveDC;
  const hasMax    = (item.max || 0) > 0;
  const hasCost   = section === 'legendaryActions' && (item.cost || 1) > 1;

  const tags = [];
  if (hasAttack) tags.push(`<span class="spell-item-tag" style="color:var(--gold)">ATK ${escHtml(item.attackBonus)}</span>`);
  if (hasDmg)    tags.push(`<span class="spell-item-tag" style="color:var(--red-light)">DMG</span>`);
  if (hasSave)   tags.push(`<span class="spell-item-tag" style="color:var(--spell)">DC ${item.saveDC}</span>`);
  if (hasCost)   tags.push(`<span class="spell-item-tag" style="color:var(--text-muted)">${item.cost} uses</span>`);

  const row = document.createElement('div');
  row.className = 'feature-row';

  const leftCol = document.createElement('div');
  leftCol.className = 'feature-left-col';

  const nameArea = document.createElement('div');
  nameArea.className = 'feature-name-area';
  nameArea.innerHTML = `
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span class="feature-name">${escHtml(item.name)}</span>
      ${tags.join('')}
    </div>
    ${item.recharge ? `<span class="feature-recharge">${escHtml(item.recharge)}</span>` : ''}
  `;

  // Hold → info panel, tap → quick roll (if applicable)
  let holdTimer = null;
  nameArea.addEventListener('pointerdown', () => {
    holdTimer = setTimeout(() => {
      holdTimer = null;
      nameArea.classList.add('holding');
      openActionInfoPanel(section, index);
    }, 500);
  });
  nameArea.addEventListener('pointerup', () => {
    if (holdTimer !== null) {
      clearTimeout(holdTimer);
      holdTimer = null;
      nameArea.classList.remove('holding');
      // Quick tap: roll attack, or open info if no roll
      if (hasAttack) {
        quickRollAction(section, index, 'normal');
      } else if (hasDmg) {
        rollActionDamage(section, index);
      } else {
        openActionInfoPanel(section, index);
      }
    } else {
      nameArea.classList.remove('holding');
    }
  });
  nameArea.addEventListener('pointercancel', () => {
    clearTimeout(holdTimer); holdTimer = null;
    nameArea.classList.remove('holding');
  });
  nameArea.addEventListener('contextmenu', e => e.preventDefault());

  const dotsDiv = document.createElement('div');
  dotsDiv.className = 'feature-dots';
  dotsDiv.id = `dots-${section}-${index}`;
  leftCol.appendChild(nameArea);
  leftCol.appendChild(dotsDiv);
  row.appendChild(leftCol);

  if (hasMax) {
    const rightCol = document.createElement('div');
    rightCol.className = 'feature-right-col';
    const step = item.step || 1;
    rightCol.innerHTML = `
      <div class="feature-ctrl-top">
        <button class="feature-restore-btn" onclick="restoreDots('${section}',${index})">⏻</button>
      </div>
      <div class="mini-tracker">
        <button class="mini-btn minus"
          onpointerdown="startDotHold('${section}',${index},1)"
          onpointerup="stopDotHold()" onpointercancel="stopDotHold()">−</button>
        <span class="mini-val" id="dots-val-${section}-${index}"></span>
        <button class="mini-btn plus"
          onpointerdown="startDotHold('${section}',${index},-1)"
          onpointerup="stopDotHold()" onpointercancel="stopDotHold()">+</button>
      </div>`;
    row.appendChild(rightCol);
  }

  return row;
}

// ── Dots system ────────────────────────────────────────────────────────
let _dotHoldTimer = null, _dotHoldInterval = null;

function startDotHold(section, index, delta) {
  _dotHoldTimer = setTimeout(() => {
    adjustDots(section, index, delta);
    _dotHoldInterval = setInterval(() => adjustDots(section, index, delta), 80);
  }, 400);
}
function stopDotHold() {
  clearTimeout(_dotHoldTimer);
  clearInterval(_dotHoldInterval);
  _dotHoldTimer = _dotHoldInterval = null;
}

function renderDots(section, index) {
  const arr  = creature[section];
  if (!arr) return;
  const item = arr[index];
  if (!item || !item.max) return;
  const step     = item.step || 1;
  const numDots  = Math.ceil(item.max / step);
  const usedDots = Math.ceil((item.used || 0) / step);
  const split    = numDots - usedDots; // gold dots on the left

  const el = document.getElementById(`dots-${section}-${index}`);
  if (el) {
    el.innerHTML = Array.from({ length: numDots }, (_, j) =>
      `<div class="slot-dot ${j < split ? 'available' : 'used'}" onclick="toggleCreatureDot('${section}',${index},${j})"></div>`
    ).join('');
  }
  const valEl = document.getElementById(`dots-val-${section}-${index}`);
  if (valEl) valEl.textContent = `${item.max - (item.used||0)}/${item.max}`;
}

function toggleCreatureDot(section, index, j) {
  const item  = creature[section]?.[index];
  if (!item) return;
  const step     = item.step || 1;
  const numDots  = Math.ceil(item.max / step);
  const usedDots = Math.ceil((item.used || 0) / step);
  const split    = numDots - usedDots;
  item.used = j < split
    ? Math.min(item.max, (numDots - j) * step)
    : (numDots - j - 1) * step;
  renderDots(section, index);
  saveRoster();
}

function adjustDots(section, index, delta) {
  const item = creature[section]?.[index];
  if (!item) return;
  const step = item.step || 1;
  item.used = Math.max(0, Math.min(item.max, (item.used || 0) + delta * step));
  renderDots(section, index);
  saveRoster();
}

function restoreDots(section, index) {
  const item = creature[section]?.[index];
  if (!item) return;
  item.used = 0;
  renderDots(section, index);
  saveRoster();
}

// ── Legendary action pool ──────────────────────────────────────────────
function renderLegendaryPool() {
  const el = document.getElementById('legendaryPoolDots');
  if (!el || !creature.legendaryActionsMax) return;
  const max  = creature.legendaryActionsMax;
  const used = creature.legendaryActionsUsed || 0;
  const avail = max - used;
  el.innerHTML = Array.from({ length: max }, (_, j) =>
    `<div class="slot-dot ${j < avail ? 'available' : 'used'}" onclick="toggleLegendaryPoolDot(${j})"></div>`
  ).join('');
}

function toggleLegendaryPoolDot(j) {
  const max  = creature.legendaryActionsMax;
  const used = creature.legendaryActionsUsed || 0;
  const avail = max - used;
  creature.legendaryActionsUsed = j < avail ? (max - j) : (max - j - 1);
  renderLegendaryPool();
  saveRoster();
}

function restoreLegendaryPool() {
  creature.legendaryActionsUsed = 0;
  renderLegendaryPool();
  saveRoster();
}

// ── Roll system ────────────────────────────────────────────────────────

function quickRollAction(section, index, mode) {
  const item = creature[section]?.[index];
  if (!item) return;
  if (item.attackBonus && item.attackBonus !== '—') {
    const bonus = parseInt(item.attackBonus) || 0;
    const { roll, breakdown } = d20Roll(mode);
    const total = roll + bonus;
    const nat   = natMsg(roll);
    const modeSfx = mode === 'adv' ? ' (Adv)' : mode === 'dis' ? ' (Disadv)' : '';
    // Also roll damage for convenience
    const dmgParts = (item.rolls || []).filter(r => r.dice);
    const dmgLines = dmgParts.map(r => {
      const t = rollDiceExpr(r.dice);
      return t !== null ? `${r.type ? r.type.charAt(0).toUpperCase()+r.type.slice(1) : 'Dmg'}: ${t}` : null;
    }).filter(Boolean);
    showRoll(item.name + modeSfx, `${breakdown}+${bonus}`, total, nat, dmgLines.join('\n'));
    // Use legendary pool if applicable
    if (section === 'legendaryActions') useLegendaryUses(item.cost || 1);
  }
}

function rollActionDamage(section, index) {
  const item = creature[section]?.[index];
  if (!item || !item.rolls?.length) return;
  const lines = item.rolls.filter(r => r.dice).map(r => {
    const t = rollDiceExpr(r.dice);
    return t !== null ? `${r.type ? r.type.charAt(0).toUpperCase()+r.type.slice(1) : 'Dmg'}: ${t}` : null;
  }).filter(Boolean);
  if (!lines.length) return;
  const totalMatch = lines[0].match(/:\s*(\d+)/);
  const total = totalMatch ? totalMatch[1] : '?';
  showRoll(item.name + ' — Damage', item.rolls.map(r => r.dice).join(' + '), total, '', lines.slice(1).join('\n'));
}

function useLegendaryUses(cost) {
  creature.legendaryActionsUsed = Math.min(creature.legendaryActionsMax, (creature.legendaryActionsUsed || 0) + cost);
  renderLegendaryPool();
  saveRoster();
}

// ── Info panel ─────────────────────────────────────────────────────────
function openActionInfoPanel(section, index) {
  const item = creature[section]?.[index];
  if (!item) return;
  const badgeMap = { specialAbilities:'Trait', actions:'Action', bonusActions:'Bonus Action', reactions:'Reaction', legendaryActions:'Legendary', lairActions:'Lair Action' };
  const badge = badgeMap[section] || 'Info';
  const hasAttack = item.attackBonus && item.attackBonus !== '—';
  const hasDmg    = item.rolls?.length > 0;
  const hasSave   = item.saveAbility && item.saveDC;
  const dmgSummary = hasDmg ? item.rolls.filter(r => r.dice).map(r => r.dice).join('+') : '';
  const metaParts = [];
  if (item.recharge) metaParts.push(item.recharge);
  if (section === 'legendaryActions' && (item.cost||1) > 1) metaParts.push(`${item.cost} legendary uses`);
  openInfoPanel({
    badge,
    title: item.name || '',
    meta: metaParts.join(' · '),
    description: item.desc || '',
    rollLabel: 'Attack Roll',
    rollBonus: hasAttack ? item.attackBonus : '',
    rollDamage: (hasAttack && dmgSummary) ? dmgSummary : '',
    rollFn: hasAttack ? mode => { quickRollAction(section, index, mode); dismissInfoPanel(); } : null,
    simpleRollLabel: 'Damage — tap to roll',
    simpleRollBonus: hasDmg ? dmgSummary : '',
    simpleRollFn: hasDmg ? () => { rollActionDamage(section, index); dismissInfoPanel(); } : null,
    saveDc: hasSave ? { value: item.saveDC, ability: item.saveAbility + ' Save' } : null,
    editFn: () => openEditPanel(section, index),
  });
}

function openCreatureInfoPanel() {
  openInfoPanel({
    badge: 'Creature',
    title: creature.name || '',
    meta: [creature.size, creature.type, creature.alignment].filter(Boolean).join(' · '),
    description: creature.notes || '(No description yet. Add it in the Info tab.)',
  });
}

// ── Section info panel ──────────────────────────────────────────────
function openSectionInfoPanel(sectionKey, label) {
  const desc = SECTION_DESCRIPTIONS[sectionKey];
  if (!desc) return;
  openInfoPanel({
    badge: 'Section',
    title: label || sectionKey,
    description: desc,
  });
}

// ── Edit Panel ──────────────────────────────────────────────────
let _editPanelSection = null;
let _editPanelIndex   = -1;

function openEditPanel(section, index) {
  if (!section) return;
  _editPanelSection = section;
  _editPanelIndex   = index;
  const isNew  = index === -1;
  const item   = isNew ? _defaultActionItem() : (creature[section]?.[index] || _defaultActionItem());
  const badgeMap = { specialAbilities:'Trait', actions:'Action', bonusActions:'Bonus Action',
    reactions:'Reaction', legendaryActions:'Legendary Action', lairActions:'Lair Action' };
  document.getElementById('epBadge').textContent = (isNew ? 'New ' : 'Edit ') + (badgeMap[section] || 'Item');
  document.getElementById('epDeleteBtn').style.display = isNew ? 'none' : '';
  const isLeg  = section === 'legendaryActions';
  const hasRolls = ['specialAbilities','actions','bonusActions','reactions','legendaryActions'].includes(section);
  document.getElementById('epForm').innerHTML = `
    <div class="ep-field">
      <div class="ep-label">Name</div>
      <input class="ep-input" id="ep_name" value="${escHtml(item.name||'')}" placeholder="Name">
    </div>
    <div class="ep-row">
      <div class="ep-field">
        <div class="ep-label">Recharge / Limit</div>
        <input class="ep-input" id="ep_recharge" value="${escHtml(item.recharge||'')}" placeholder="e.g. Recharge 5-6, 1/Day">
      </div>
      ${isLeg ? `<div class="ep-field" style="max-width:80px">
        <div class="ep-label">Pool Cost</div>
        <input class="ep-input" id="ep_cost" type="number" min="1" max="9" value="${item.cost||1}">
      </div>` : '<div id="ep_cost" style="display:none"></div>'}
    </div>
    <div class="ep-row">
      <div class="ep-field">
        <div class="ep-label">Max Charges (0 = unlimited)</div>
        <input class="ep-input" id="ep_max" type="number" min="0" value="${item.max||0}">
      </div>
      <div class="ep-field" style="max-width:80px">
        <div class="ep-label">Step</div>
        <input class="ep-input" id="ep_step" type="number" min="1" value="${item.step||1}">
      </div>
    </div>
    ${hasRolls ? `<div class="ep-row">
      <div class="ep-field">
        <div class="ep-label">Attack Bonus</div>
        <input class="ep-input" id="ep_atk" value="${escHtml(item.attackBonus||'')}" placeholder="e.g. +7">
      </div>
      <div class="ep-field">
        <div class="ep-label">Damage Dice</div>
        <input class="ep-input" id="ep_dmg" value="${escHtml(item.rolls?.[0]?.dice||'')}" placeholder="2d6+5">
      </div>
    </div>
    <div class="ep-row">
      <div class="ep-field">
        <div class="ep-label">Damage Type</div>
        <input class="ep-input" id="ep_dmgtype" value="${escHtml(item.rolls?.[0]?.type||'')}" placeholder="slashing">
      </div>
      <div class="ep-field">
        <div class="ep-label">Save DC (0 = none)</div>
        <input class="ep-input" id="ep_savedc" type="number" min="0" value="${item.saveDC||0}">
      </div>
    </div>
    <div class="ep-field">
      <div class="ep-label">Save Ability</div>
      <select class="ep-input" id="ep_saveab">
        <option value="">—</option>
        ${['STR','DEX','CON','INT','WIS','CHA'].map(ab =>
          `<option value="${ab}"${item.saveAbility===ab?' selected':''}>${ab}</option>`).join('')}
      </select>
    </div>` : '<input id="ep_atk" style="display:none"><input id="ep_dmg" style="display:none"><input id="ep_dmgtype" style="display:none"><input id="ep_savedc" style="display:none" value="0"><select id="ep_saveab" style="display:none"></select>'}
    <div class="ep-field">
      <div class="ep-label">Description</div>
      <textarea class="ep-input ep-textarea" id="ep_desc">${escHtml(item.desc||'')}</textarea>
    </div>`;
  document.getElementById('editPanel').classList.add('show');
  document.getElementById('editPanelBackdrop').classList.add('show');
  dismissInfoPanel();
}

function _defaultActionItem() {
  return { name:'', desc:'', attackBonus:'', rolls:[], saveAbility:'', saveDC:0, max:0, used:0, step:1, recharge:'', cost:1 };
}

function saveEditPanel() {
  const section = _editPanelSection;
  const index   = _editPanelIndex;
  if (!section) { dismissEditPanel(); return; }
  if (!creature[section]) creature[section] = [];
  const name = (document.getElementById('ep_name')?.value || '').trim();
  if (!name) { toast('Name is required'); return; }
  const dice  = (document.getElementById('ep_dmg')?.value || '').trim();
  const dType = (document.getElementById('ep_dmgtype')?.value || '').trim();
  const rolls = dice ? [{ dice, type: dType || 'untyped' }] : [];
  const item = {
    name,
    desc:        document.getElementById('ep_desc')?.value || '',
    attackBonus: (document.getElementById('ep_atk')?.value || '').trim(),
    rolls,
    saveAbility: document.getElementById('ep_saveab')?.value || '',
    saveDC:      parseInt(document.getElementById('ep_savedc')?.value) || 0,
    max:         parseInt(document.getElementById('ep_max')?.value)    || 0,
    used:        0,
    step:        Math.max(1, parseInt(document.getElementById('ep_step')?.value) || 1),
    recharge:    (document.getElementById('ep_recharge')?.value || '').trim(),
    cost:        parseInt(document.getElementById('ep_cost')?.value)   || 1,
  };
  if (index !== -1 && creature[section][index]) {
    item.used = creature[section][index].used || 0;
  }
  if (index === -1) {
    creature[section].push(item);
  } else {
    creature[section][index] = item;
  }
  saveRoster();
  renderCreatureDetail();
  dismissEditPanel();
  toast(index === -1 ? 'Added!' : 'Saved!');
}

function deleteFromEditPanel() {
  const section = _editPanelSection;
  const index   = _editPanelIndex;
  if (!section || index === -1) { dismissEditPanel(); return; }
  const itemName = creature[section]?.[index]?.name || 'this item';
  if (!confirm(`Delete "${itemName}"?`)) return;
  creature[section].splice(index, 1);
  saveRoster();
  renderCreatureDetail();
  dismissEditPanel();
  toast('Deleted');
}

function dismissEditPanel() {
  document.getElementById('editPanel').classList.remove('show');
  document.getElementById('editPanelBackdrop').classList.remove('show');
  _editPanelSection = null;
  _editPanelIndex   = -1;
}

function openCreatureSettings() {
  document.getElementById('settingsSheet').classList.add('show');
  document.getElementById('settingsBackdrop').classList.add('show');
}
function dismissCreatureSettings() {
  document.getElementById('settingsSheet').classList.remove('show');

function openPortraitPicker() { document.getElementById('portraitInput').click(); }
function handlePortraitFile(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    creature.portrait = e.target.result;
    saveRoster();
    renderCreatureDetail();
    toast('Portrait set');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ── JSON export / import ───────────────────────────────────────────────
function exportCreatureJSON() {
  const name = (creature.name || 'creature').replace(/[^a-z0-9]/gi, '_').toLowerCase();
  const blob = new Blob([JSON.stringify(creature, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = name + '.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Exported: ' + name + '.json');
}

function importCreatureFromJSON(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      applyCreaturePayload(data);
      dismissCreatureSettings();
      toast('Creature loaded!');
    } catch { toast('Error: invalid JSON file'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function applyCreaturePayload(data) {
  if (!data || typeof data !== 'object') return;
  // Support both raw creature state and wrapped { payload: ... }
  const payload = data.payload || data;
  const id = activeId || genId();
  activeId = id;
  creature = Object.assign(defaultCreature(), payload);
  rosterData.creatures[id] = { name: creature.name, portrait: creature.portrait, payload: creature };
  rosterData.activeId = id;
  saveRoster();
  renderCreatureDetail();
  showDetail();
}

function importAICreatureResponse() {
  const raw = document.getElementById('aiResponsePaste').value.trim();
  if (!raw) { toast('Nothing pasted yet'); return; }
  let parsed;
  try {
    const stripped = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '');
    parsed = JSON.parse(stripped);
  } catch { toast('Invalid JSON — check the pasted text'); return; }
  if (!parsed.name) { toast('Missing "name" field'); return; }
  applyCreaturePayload(parsed);
  dismissImportModal();
  toast(`${parsed.name} imported!`);
}

// ── SRD 2014 Search ────────────────────────────────────────────────────
let _srd14MonsterList = null;
let _srd14SearchTimeout = null;

async function onSrd14Search() {
  clearTimeout(_srd14SearchTimeout);
  _srd14SearchTimeout = setTimeout(_doSrd14Search, 350);
}

async function _doSrd14Search() {
  const q = document.getElementById('srd14SearchInput').value.trim().toLowerCase();
  const statusEl  = document.getElementById('srd14Status');
  const resultsEl = document.getElementById('srd14Results');
  if (q.length < 2) { resultsEl.innerHTML = '<div class="srd-hint">Type at least 2 characters.</div>'; return; }
  statusEl.textContent = 'Loading…';
  try {
    if (!_srd14MonsterList) {
      const data = await _srdGet('/monsters?limit=500');
      _srd14MonsterList = data.results || [];
    }
    const matches = _srd14MonsterList.filter(m => m.name.toLowerCase().includes(q)).slice(0, 30);
    statusEl.textContent = matches.length ? `${matches.length} result${matches.length>1?'s':''}` : 'No results';
    if (!matches.length) { resultsEl.innerHTML = '<div class="srd-hint">No matches found.</div>'; return; }
    resultsEl.innerHTML = matches.map(m =>
      `<div class="srd-result-item" onclick="importFromSrd14('${escHtml(m.index)}','${escHtml(m.name)}')">${escHtml(m.name)}</div>`
    ).join('');
  } catch(e) { statusEl.textContent = 'Error loading SRD — check internet connection.'; }
}

async function importFromSrd14(index, name) {
  const statusEl = document.getElementById('srd14Status');
  statusEl.textContent = `Loading ${name}…`;
  try {
    const data = await _srdGet('/monsters/' + index);
    const c = parseSrd2014Monster(data);
    applyCreaturePayload(c);
    dismissImportModal();
    toast(`${name} imported from SRD 2014`);
  } catch(e) { statusEl.textContent = 'Error loading monster.'; toast('Error: ' + e.message); }
}

async function onSrd24Search() {

  _srd24SearchTimeout = setTimeout(_doSrd24Search, 350);
}

  const q = document.getElementById('srd24SearchInput').value.trim().toLowerCase();

  const resultsEl = document.getElementById('srd24Results');
  if (q.length < 2) { resultsEl.innerHTML = '<div class="srd-hint">Type at least 2 characters.</div>'; return; }

async function importFromSrd24(listIndex, name) {
  const statusEl = document.getElementById('srd24Status');
  statusEl.textContent = `Importing ${name}…`;
  try {
    if (!_srd24Creatures) _srd24Creatures = await _srd24Load('creatures');
    const q = document.getElementById('srd24SearchInput').value.trim().toLowerCase();
    const matches = _srd24Creatures.filter(m =>
      (m.name||'').toLowerCase().includes(q) || (m.type||'').toLowerCase().includes(q)
