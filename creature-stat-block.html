    dismissImportModal();
    toast(`${name} imported from SRD 2024`);
  } catch(e) { statusEl.textContent = 'Error importing.'; toast('Error: ' + e.message); }
}

// ── SRD Parsing ────────────────────────────────────────────────────────
function parseSrd2014Monster(d) {
  const c = defaultCreature();
  c.name      = d.name || 'Unknown';
  c.source    = 'srd2014';
  c.size      = d.size ? d.size.charAt(0).toUpperCase() + d.size.slice(1).toLowerCase() : 'Medium';
  c.type      = d.type || '';
  c.subtype   = d.subtype || '';
  c.alignment = d.alignment || '';
  c.cr        = d.challenge_rating ?? 0;
  c.xp        = d.xp ?? crXP(c.cr);
  // AC: API returns array [{value,type}] or single number
  if (Array.isArray(d.armor_class)) {
    c.ac       = d.armor_class[0]?.value ?? d.armor_class[0] ?? 10;
    c.acDetail = d.armor_class[0]?.type || '';
  } else { c.ac = d.armor_class || 10; }
  c.hp      = d.hit_points || 0;
  c.hitDice = d.hit_dice || '';
  // Speed
  if (d.speed) {
    c.speed.walk   = parseInt(d.speed.walk)   || 0;
    c.speed.fly    = parseInt(d.speed.fly)    || 0;
    c.speed.swim   = parseInt(d.speed.swim)   || 0;
    c.speed.climb  = parseInt(d.speed.climb)  || 0;
    c.speed.burrow = parseInt(d.speed.burrow) || 0;
    c.speed.hover  = !!(d.speed.hover);
  }
  // Abilities
  const abMap = {strength:'STR',dexterity:'DEX',constitution:'CON',intelligence:'INT',wisdom:'WIS',charisma:'CHA'};
  Object.entries(abMap).forEach(([long, short]) => { if (d[long] !== undefined) c.abilities[short] = d[long]; });
  // Saving throws from proficiencies array
  if (Array.isArray(d.proficiencies)) {
    d.proficiencies.forEach(p => {
      const idx = p.proficiency?.index || '';
      const stMatch = idx.match(/^saving-throw-(\w+)$/i);
      if (stMatch) c.savingThrows[stMatch[1].toUpperCase()] = p.value;
      const skMatch = idx.match(/^skill-(.+)$/i);
      if (skMatch) c.skills[skMatch[1].replace(/-/g,' ')] = p.value;
    });
  }
  // Damage interactions
  c.damageImmunities    = d.damage_immunities    || [];
  c.damageResistances   = d.damage_resistances   || [];
  c.damageVulnerabilities = d.damage_vulnerabilities || [];
  c.conditionImmunities = (d.condition_immunities || []).map(ci => ci.name || ci);
  // Senses
  if (d.senses) {
    c.senses.darkvision    = parseInt(d.senses.darkvision)    || 0;
    c.senses.blindsight    = parseInt(d.senses.blindsight)    || 0;
    c.senses.truesight     = parseInt(d.senses.truesight)     || 0;
    c.senses.tremorsense   = parseInt(d.senses.tremorsense)   || 0;
    c.senses.passivePerception = d.senses.passive_perception  || 10;
    c.telepathy            = parseInt(d.senses.telepathy)     || 0;
  }
  c.languages = d.languages || '';
  c.legendaryActionsMax = d.legendary_actions_per_round ?? (d.legendary_actions?.length ? 3 : 0);
  // Special abilities
  c.specialAbilities = (d.special_abilities || []).map(sa => {
    const uses = parseUsesFromName(sa.name || '');
    return { name: sa.name||'', desc: sa.desc||'', max: uses.max, used:0, step:1, recharge: uses.recharge };
  });
  // Actions
  c.actions = (d.actions || []).filter(a => !a.legendary_cost).map(a => _parseAction(a));
  // Legendary actions
  c.legendaryActions = (d.legendary_actions || []).map(la => {
    const parsed = _parseAction(la);
    parsed.cost = la.attack_bonus_to_legendary_actions || 1;
    return parsed;
  });
  // Also handle 2014 API's interleaved action types
  const allActions = d.actions || [];
  const legFromActions = allActions.filter(a => a.legendary_cost);
  if (legFromActions.length && !c.legendaryActions.length) {
    c.legendaryActions = legFromActions.map(a => { const p = _parseAction(a); p.cost = a.legendary_cost || 1; return p; });
    c.legendaryActionsMax = c.legendaryActionsMax || 3;
  }
  return c;
}

function parseSrd2024Monster(d) {
  const c = defaultCreature();
  c.name      = d.name || 'Unknown';
  c.source    = 'srd2024';
  c.size      = d.size ? d.size.charAt(0).toUpperCase() + d.size.slice(1).toLowerCase() : 'Medium';
  c.type      = d.type || '';
  c.subtype   = d.subtype || '';
  c.alignment = d.alignment || '';
  c.cr        = d.challenge_rating ?? 0;
  c.xp        = d.experience_points ?? crXP(c.cr);
  c.ac        = d.armor_class || 10;
  c.acDetail  = d.armor_detail || '';
  c.hp        = d.hit_points || 0;
  c.hitDice   = d.hit_dice || '';
  // Speed (2024 uses 'speeds' key)
  const spd = d.speeds || d.speed || {};
  c.speed.walk   = spd.walk   || 0;
  c.speed.fly    = spd.fly    || 0;
  c.speed.swim   = spd.swim   || 0;
  c.speed.climb  = spd.climb  || 0;
  c.speed.burrow = spd.burrow || 0;
  c.speed.hover  = !!(spd.hover);
  // Abilities (2024 uses lowercase keys in ability_scores)
  const as = d.ability_scores || {};
  ['str','dex','con','int','wis','cha'].forEach(ab => {
    const key = ab.toUpperCase();
    if (as[ab] !== undefined) c.abilities[key] = as[ab];
    else if (as[key] !== undefined) c.abilities[key] = as[key];
  });
  // Saving throws (2024 stores as object {str:5, dex:3, ...})
  const st = d.saving_throws || {};
  Object.entries(st).forEach(([ab, val]) => {
    if (val !== null && val !== undefined) c.savingThrows[ab.toUpperCase()] = val;
  });
  // Skills
  const sk = d.skills || {};
  Object.entries(sk).forEach(([name, val]) => { c.skills[name] = val; });
  // Damage interactions
  c.damageImmunities      = d.damage_immunities       || [];
  c.damageResistances     = d.damage_resistances      || [];
  c.damageVulnerabilities = d.damage_vulnerabilities  || [];
  c.conditionImmunities   = d.condition_immunities    || [];
  // Senses
  const sn = d.senses || {};
  c.senses.darkvision      = sn.darkvision      || 0;
  c.senses.blindsight      = sn.blindsight      || 0;
  c.senses.truesight       = sn.truesight       || 0;
  c.senses.tremorsense     = sn.tremorsense     || 0;
  c.senses.passivePerception = sn.passive_perception || 10;
  c.telepathy = sn.telepathy || d.telepathy || 0;
  c.languages = d.languages || '';
  // Legendary pool
  c.legendaryActionsMax = d.legendary_actions_per_round || 0;
  // New metadata fields
  c.habitat        = d.habitat || '';
  c.treasure       = d.treasure || '';
  c.initiative     = d.initiative || '';
  c.lairDescription = d.lair_description || d.lairDescription || '';
  // Actions — 2024 may mix all action types in one array using action_type field
  const allActions = d.actions || [];
  const legTypes = ['LEGENDARY_ACTION','LEGENDARY'];
  c.specialAbilities = (d.special_abilities || []).map(sa => {
    const uses = parseUsesFromName(sa.name || '');
    return { name: sa.name||'', desc: sa.desc||'', max: uses.max, used:0, step:1, recharge: uses.recharge };
  });
  const bonusTypes = ['BONUS_ACTION','BONUS'];
  c.bonusActions = allActions
    .filter(a => bonusTypes.includes((a.action_type||'').toUpperCase()))
    .map(a => _parseAction(a));
  c.actions = allActions
    .filter(a => !legTypes.includes((a.action_type||'').toUpperCase()) && !bonusTypes.includes((a.action_type||'').toUpperCase()))
    .map(a => _parseAction(a));
  const legActions = allActions.filter(a => legTypes.includes((a.action_type||'').toUpperCase()));
  if (legActions.length) {
    c.legendaryActions = legActions.map(a => { const p = _parseAction(a); p.cost = a.legendary_cost || 1; return p; });
    if (!c.legendaryActionsMax) c.legendaryActionsMax = 3;
  }
  return c;
}

function _parseAction(a) {
  const name = a.name || '';
  const desc = a.desc || '';
  const uses = parseUsesFromName(name);
  const parsed = parseActionDesc(name, desc);
  return {
    name, desc,
    attackBonus: parsed.attackBonus,
    rolls: parsed.rolls,
    saveAbility: parsed.saveAbility,
    saveDC: parsed.saveDC,
    max: uses.max,
    used: 0,
    step: 1,
    recharge: uses.recharge,
    cost: a.cost || a.legendary_cost || 1,
  };
}

function parseUsesFromName(name) {
  const dayMatch = name.match(/\((\d+)\s*\/\s*(Day|Rest|Dawn|Long\s*Rest|Short\s*Rest|Turn)\)/i);
  if (dayMatch) return { max: parseInt(dayMatch[1]), recharge: dayMatch[2].replace(/\s+/g,' ') };
  const rechargeMatch = name.match(/\(Recharge\s+([\d\-–]+)\)/i);
  if (rechargeMatch) return { max: 1, recharge: `Recharge ${rechargeMatch[1]}` };
  return { max: 0, recharge: '' };
}

function parseActionDesc(name, desc) {
  const result = { attackBonus: null, rolls: [], saveAbility: null, saveDC: 0 };
  // Attack bonus
  const atkMatch = desc.match(/Attack Roll:\s*([+-]\d+)/i) ||
                   desc.match(/([+-]\d+)\s+to hit/i) ||
                   (name && desc.match(/^\s*([+-]\d+)/));
  if (atkMatch) result.attackBonus = atkMatch[1];
  // Damage rolls: match (NdN) or (NdN+N) or (NdN-N) followed by type damage
  const validTypes = ['slashing','piercing','bludgeoning','fire','cold','lightning','thunder','acid','poison','necrotic','radiant','force','psychic','healing'];
  const dmgRe = /\((\d+d\d+(?:\s*[+\-]\s*\d+)?)\)\s*(\w+)\s+damage/gi;
  let m;
  while ((m = dmgRe.exec(desc)) !== null) {
    const dice    = m[1].replace(/\s+/g, '');
    const typeRaw = m[2].toLowerCase();
    result.rolls.push({ dice, type: validTypes.includes(typeRaw) ? typeRaw : 'other' });
  }
  // Save DC
  const saveMatch = desc.match(/(\w+)\s+Saving Throw:\s*DC\s*(\d+)/i) ||
                    desc.match(/DC\s*(\d+)[^,]*?(\w+)\s+saving throw/i);
  if (saveMatch) {
    const raw = (saveMatch[1] || saveMatch[2] || '').toUpperCase();
    const abMap = { STRENGTH:'STR',DEXTERITY:'DEX',CONSTITUTION:'CON',INTELLIGENCE:'INT',WISDOM:'WIS',CHARISMA:'CHA' };
    result.saveAbility = abMap[raw] || (raw.length === 3 ? raw : raw.slice(0,3));
    result.saveDC = parseInt(saveMatch[2] || saveMatch[1]) || 0;
  }
  return result;
}

// ── Init ───────────────────────────────────────────────────────────────
function init() {
  _applyTheme();
  loadRoster();

  // Handle "open specific creature" flag from character sheet
  const openId = localStorage.getItem(OPEN_KEY);
  if (openId && rosterData.creatures[openId]) {
    activeId = openId;
    creature = JSON.parse(JSON.stringify(rosterData.creatures[openId].payload || defaultCreature()));
  } else {
    activeId = rosterData.activeId;
    if (activeId && rosterData.creatures[activeId]) {
      creature = JSON.parse(JSON.stringify(rosterData.creatures[activeId]?.payload || defaultCreature()));
    } else if (Object.keys(rosterData.creatures).length) {
      activeId = Object.keys(rosterData.creatures)[0];
      creature = JSON.parse(JSON.stringify(rosterData.creatures[activeId]?.payload || defaultCreature()));
    } else {
      activeId = genId();
      creature = defaultCreature();
      rosterData.creatures[activeId] = { name: creature.name, portrait: null, payload: creature };
      rosterData.activeId = activeId;
      saveRoster();
    }
  }

  const ctx = _getContext();
  const openKey = localStorage.getItem(OPEN_KEY);

  // If opened with a specific creature from character sheet, go straight to detail
  if (openKey && rosterData.creatures[openKey]) {
    localStorage.removeItem(OPEN_KEY);
    activeId = openKey;
    creature = JSON.parse(JSON.stringify(rosterData.creatures[openKey].payload || defaultCreature()));
    renderCreatureDetail();
    showDetail();
  } else {
    renderGrid();
    showGrid();
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
